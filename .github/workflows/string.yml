name: String macros debug run

on:
  workflow_dispatch:
    inputs:
      specific_folders_input:
        description: 'Specific folders to include (comma-separated if multiple)'
        required: false
        default: ''
        type: string
      enable_chat:
        description: 'Enable chat inserts (50% of files)'
        required: false
        default: false
        type: boolean
      use_specific_folders:
        description: 'Use specific folders only (filter mode)'
        required: false
        default: true
        type: boolean
      versions:
        description: 'Total versions to generate *'
        required: true
        default: '12'
      target_minutes:
        description: 'Target duration per stringed file *'
        required: true
        default: '100'

jobs:
  debug-string:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Output INPUTS and ENV
        run: |
          echo "::group::GITHUB_ENV"
          env
          echo "::endgroup::"
          echo "::group::GITHUB INPUTS"
          echo "${{ toJson(github.event.inputs) }}"
          echo "::endgroup::"

      - name: Show folder structure before running
        run: |
          echo "PWD: $PWD"
          ls -l .
          ls -l ./input_macros || true

      - name: Build script arguments
        id: args
        run: |
          ARGS=("input_macros" "output" "--versions" "${{ github.event.inputs.versions }}" "--target-minutes" "${{ github.event.inputs.target_minutes }}" "--bundle-id" "999")
          if [ "${{ github.event.inputs.enable_chat }}" = "false" ]; then
            ARGS+=("--no-chat")
          fi
          if [ "${{ github.event.inputs.use_specific_folders }}" = "true" ] && [ -f ".github/specific_folders_to_include.txt" ]; then
            ARGS+=("--specific-folders" ".github/specific_folders_to_include.txt")
          fi
          echo "${ARGS[@]}"
          echo "ARGS=${ARGS[@]}" >> "$GITHUB_ENV"

      - name: Scrub output dir before run
        run: rm -rf output && mkdir output

      - name: List output dir before Python script
        run: ls -la output/

      - name: Run string_macros.py with tracebacks
        run: |
          set -o pipefail
          echo "Running: python3 string_macros.py $ARGS"
          python3 string_macros.py $ARGS 2>&1 | tee __string_debug.log
          echo "::group::Show output directory"
          ls -la output || true
          echo "::endgroup::"
          echo "::group::Show debug log"
          tail -n 100 __string_debug.log
          echo "::endgroup::"
        env:
          ARGS: ${{ env.ARGS }}

      - name: List output again after script run
        run: ls -la output/ || true

      - name: Archive debug log
        uses: actions/upload-artifact@v4
        with:
          name: debug-log
          path: __string_debug.log

      - name: Print output bundle contents (if any)
        run: |
          if [ -d output ]; then
            find output -type f
          fi
