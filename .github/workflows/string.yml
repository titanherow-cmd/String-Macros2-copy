name: String macros (v3.18.88 - 7z compression + subfolder filtering)

on:
  workflow_dispatch:
    inputs:
      folder_1:
        description: 'Folder 1'
        required: false
        default: '-- none --'
        type: choice
        options:
          - 'ALL FOLDERS'
          - '-- none --'
          - '18- WC- draynor willow- inzoom- S slightly SE'
          - '20- Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '22- Craft Dia- edge- lamp bank Z- S'
          - '55- Mining- alkharid U1T- inz- N- TIME SENSITIVE'
          - '57- Finish up noted smth alch leftover'
          - '58- Smth R2H only- Varr- zoomanvil left- W'
          - '61- Mining- Mining Guild- inz- N- TIME SENSITIVE'
          - '62- SSmth+Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '5- FM- NoFire Zspotfire busy world- GE- intz- W- TIME SENSITIVE'
          - 'Cook straight spot'
          - 'Fishing click+time sensitive - Copy'
          - 'Fishing experimental- click+time sensitive'
          - 'FM straight spot- TIME SENSITIVE'
          - 'FM+COOK straight spot - TIME SENSITIVE'
          - '55- mMining- alkharid U1T- inz- N- TIME SENSITIVE'
          - '60- Smth R2H only- Varr- zoomanvil left- W'
          - '61- Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '62- Smth Only+Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '6- Smithing files'
          - 'x'
          
      folder_2:
        description: 'Folder 2'
        required: false
        default: '-- none --'
        type: choice
        options:
          - 'ALL FOLDERS'
          - '-- none --'
          - '18- WC- draynor willow- inzoom- S slightly SE'
          - '20- Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '22- Craft Dia- edge- lamp bank Z- S'
          - '55- Mining- alkharid U1T- inz- N- TIME SENSITIVE'
          - '57- Finish up noted smth alch leftover'
          - '58- Smth R2H only- Varr- zoomanvil left- W'
          - '61- Mining- Mining Guild- inz- N- TIME SENSITIVE'
          - '62- SSmth+Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '5- FM- NoFire Zspotfire busy world- GE- intz- W- TIME SENSITIVE'
          - 'Cook straight spot'
          - 'Fishing click+time sensitive - Copy'
          - 'Fishing experimental- click+time sensitive'
          - 'FM straight spot- TIME SENSITIVE'
          - 'FM+COOK straight spot - TIME SENSITIVE'
          - '55- mMining- alkharid U1T- inz- N- TIME SENSITIVE'
      folder_3:
        description: 'Folder 3'
        required: false
        default: '-- none --'
        type: choice
        options:
          - 'ALL FOLDERS'
          - '-- none --'
          - '18- WC- draynor willow- inzoom- S slightly SE'
          - '20- Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '22- Craft Dia- edge- lamp bank Z- S'
          - '55- Mining- alkharid U1T- inz- N- TIME SENSITIVE'
          - '57- Finish up noted smth alch leftover'
          - '58- Smth R2H only- Varr- zoomanvil left- W'
          - '61- Mining- Mining Guild- inz- N- TIME SENSITIVE'
          - '62- SSmth+Smth R2H+NotedAlch- Varr- zoomanvil left- W'
          - '5- FM- NoFire Zspotfire busy world- GE- intz- W- TIME SENSITIVE'
          - 'Cook straight spot'
          - 'Fishing click+time sensitive - Copy'
          - 'Fishing experimental- click+time sensitive'
          - 'FM straight spot- TIME SENSITIVE'
          - 'FM+COOK straight spot - TIME SENSITIVE'
          - '55- mMining- alkharid U1T- inz- N- TIME SENSITIVE'
      versions:
        description: 'Total versions to generate *'
        required: true
        default: '22'
      target_minutes:
        description: 'Target duration per stringed file *'
        required: true
        default: '60'
      enable_chat:
        description: 'Enable chat inserts (50% of files)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  string:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Get current BUNDLE_SEQ
        id: seq
        run: |
          if [ -f .github/string_bundle_counter.txt ]; then
            VAL=$(cat .github/string_bundle_counter.txt)
          else
            VAL=1
          fi
          echo "BUNDLE_SEQ=$VAL" >> "$GITHUB_ENV"

      - name: Process folder selections
        id: process_folders
        run: |
          SAVED_FILE=".github/specific_folders_to_include.txt"
          F1="${{ github.event.inputs.folder_1 }}"
          F2="${{ github.event.inputs.folder_2 }}"
          F3="${{ github.event.inputs.folder_3 }}"

          # ALL FOLDERS in any slot → run everything, clear saved file
          if [ "$F1" = "ALL FOLDERS" ] || [ "$F2" = "ALL FOLDERS" ] || [ "$F3" = "ALL FOLDERS" ]; then
            rm -f "$SAVED_FILE"
            echo "FOLDERS_FILE=" >> "$GITHUB_ENV"
            echo "USE_SPECIFIC=false" >> "$GITHUB_ENV"
            echo "FOLDERS_SOURCE=ALL FOLDERS — processing entire input_macros" >> "$GITHUB_ENV"
            echo "FOLDERS_UPDATED=false" >> "$GITHUB_ENV"

          else
            # Collect specific non-blank selections
            SELECTED_FOLDERS=()
            for SLOT in "$F1" "$F2" "$F3"; do
              if [ "$SLOT" != "-- none --" ] && [ -n "$SLOT" ]; then
                SELECTED_FOLDERS+=("$SLOT")
              fi
            done

            if [ ${#SELECTED_FOLDERS[@]} -gt 0 ]; then
              # One or more folders explicitly chosen — save and use them
              mkdir -p .github
              printf '%s\n' "${SELECTED_FOLDERS[@]}" > "$SAVED_FILE"
              echo "FOLDERS_FILE=$SAVED_FILE" >> "$GITHUB_ENV"
              echo "USE_SPECIFIC=true" >> "$GITHUB_ENV"
              echo "FOLDERS_SOURCE=dropdown (${#SELECTED_FOLDERS[@]} folder(s) selected)" >> "$GITHUB_ENV"
              echo "FOLDERS_UPDATED=true" >> "$GITHUB_ENV"
              echo "Saved ${#SELECTED_FOLDERS[@]} folder(s) to $SAVED_FILE:"
              printf '  - %s\n' "${SELECTED_FOLDERS[@]}"

            elif [ -f "$SAVED_FILE" ]; then
              # All dropdowns left as -- none -- → reuse the last saved selection
              echo "FOLDERS_FILE=$SAVED_FILE" >> "$GITHUB_ENV"
              echo "USE_SPECIFIC=true" >> "$GITHUB_ENV"
              echo "FOLDERS_SOURCE=repeating last saved selection from $SAVED_FILE" >> "$GITHUB_ENV"
              echo "FOLDERS_UPDATED=false" >> "$GITHUB_ENV"
              echo "Repeating last selection:"
              cat "$SAVED_FILE"

            else
              # Nothing chosen and no saved file → run everything
              echo "FOLDERS_FILE=" >> "$GITHUB_ENV"
              echo "USE_SPECIFIC=false" >> "$GITHUB_ENV"
              echo "FOLDERS_SOURCE=no selection and no saved file — processing ALL folders" >> "$GITHUB_ENV"
              echo "FOLDERS_UPDATED=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Display settings
        run: |
          echo "========================================"
          echo "STRING MACROS v3.18.88"
          echo "========================================"
          echo "Bundle ID: ${{ env.BUNDLE_SEQ }}"
          echo "Versions: ${{ github.event.inputs.versions }}"
          echo "Target: ${{ github.event.inputs.target_minutes }} minutes"
          if [ "${{ inputs.enable_chat }}" = "true" ]; then
            echo "Chat: ENABLED (50% of files)"
          else
            echo "Chat: DISABLED"
          fi
          echo "Folder mode: ${{ env.FOLDERS_SOURCE }}"
          if [ -n "${{ env.FOLDERS_FILE }}" ]; then
            echo "Folders to process:"
            cat "${{ env.FOLDERS_FILE }}"
          fi
          echo "========================================"

      - name: Execute string macros script
        run: |
          mkdir -p output

          ARGS=(
            "input_macros"
            "output"
            "--versions" "${{ github.event.inputs.versions }}"
            "--target-minutes" "${{ github.event.inputs.target_minutes }}"
            "--bundle-id" "${{ env.BUNDLE_SEQ }}"
          )

          if [ "${{ inputs.enable_chat }}" = "false" ]; then
            ARGS+=("--no-chat")
          fi

          if [ "${{ env.USE_SPECIFIC }}" = "true" ] && [ -n "${{ env.FOLDERS_FILE }}" ]; then
            ARGS+=("--specific-folders" "${{ env.FOLDERS_FILE }}")
          fi

          echo "Running: python3 string_macros.py ${ARGS[@]}"
          echo ""
          python3 string_macros.py "${ARGS[@]}"

      - name: Commit and Push Updates
        run: |
          NEW_VAL=$((BUNDLE_SEQ + 1))
          mkdir -p .github
          echo "$NEW_VAL" > .github/string_bundle_counter.txt

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add .github/string_bundle_counter.txt

          if [ "${{ env.FOLDERS_UPDATED }}" = "true" ]; then
            git add ".github/specific_folders_to_include.txt"
            git commit -m "Update string folders list and increment counter to $NEW_VAL" || echo "No changes"
          else
            git commit -m "Increment bundle counter to $NEW_VAL" || echo "No changes"
          fi

          git push || echo "Push failed"

      - name: Add combination file to output
        run: |
          BUNDLE_DIR="output/stringed_bundle_${{ env.BUNDLE_SEQ }}"
          COMBO_FILE="output/COMBINATION_HISTORY_${{ env.BUNDLE_SEQ }}.txt"

          if [ -f "$COMBO_FILE" ]; then
            cp "$COMBO_FILE" "$BUNDLE_DIR/" 2>/dev/null || echo "Could not copy combination file"
            echo "✓ Copied combination file to bundle"
          else
            echo "⚠️ No combination file found at $COMBO_FILE"
          fi

      - name: Create ZIP artifact
        run: |
          BUNDLE_NAME="stringed_bundle_${{ env.BUNDLE_SEQ }}"
          ZIP_FILE="stringed_macros_${{ env.BUNDLE_SEQ }}.7z"

          echo "Creating ZIP from: output/$BUNDLE_NAME"
          ls -R output/

          if [ -d "output/$BUNDLE_NAME" ]; then
            if [ "${{ env.USE_SPECIFIC }}" = "true" ]; then
              echo "Specific folders mode: Creating flat 7z structure..."

              if [ -z "$(ls -A "output/$BUNDLE_NAME")" ]; then
                echo "✗ Error: Directory output/$BUNDLE_NAME is empty!"
                exit 1
              fi

              echo "Contents to zip:"
              ls -la "output/$BUNDLE_NAME"

              cd "output/$BUNDLE_NAME"
              7z a -mx=9 -mmt=2 "../../$ZIP_FILE" .
              cd ../..
              echo "✓ Created flat structure: $ZIP_FILE"
            else
              echo "Normal mode: Creating standard 7z structure..."
              7z a -mx=9 -mmt=2 "$ZIP_FILE" "output/$BUNDLE_NAME"
              echo "✓ Created: $ZIP_FILE"
            fi
          else
            echo "✗ Error: Directory output/$BUNDLE_NAME was not found!"
            exit 1
          fi
          echo "FINAL_ZIP=$ZIP_FILE" >> "$GITHUB_ENV"

      - name: Upload stringed ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: stringed_macros_bundle_${{ env.BUNDLE_SEQ }}
          path: ${{ env.FINAL_ZIP }}
          retention-days: 1
